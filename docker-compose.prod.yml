# ─────────────────────────────────────────────────────────────────────────────
# LNZ Portfolio Analytics — Docker Compose (Production)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Prerequisites:
#   1. Copy .env.prod.example → .env and fill in all values
#   2. Set LNZ_DOMAIN in .env to your domain (e.g. lnz.yourdomain.com)
#   3. Point your domain's A record to this server's IP
#   4. Caddy will obtain a Let's Encrypt certificate automatically on first start
#
# Differences from development compose:
#   - No source volume mounts — code is baked into the Docker image
#   - API uses 2 uvicorn workers, no --reload
#   - Web runs a production Next.js build (npm run build && npm start)
#   - Caddy handles HTTPS termination on ports 80/443
#   - API and web are NOT exposed to the internet directly; only Caddy is
#   - HIDE_DOCS=true hides /docs and /redoc from public access
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lnz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lnz_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # postgres is NOT exposed externally in production

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lnz}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lnz_db}
      SECRET_KEY: ${SECRET_KEY}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-mock}
      NEWS_PROVIDER: ${NEWS_PROVIDER:-live}
      AI_PROVIDER: ${LNZ_AI_PROVIDER:-deterministic}
      GEMINI_API_KEY: ${LNZ_GEMINI_API_KEY:-}
      GEMINI_MODEL: ${LNZ_GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${LNZ_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      OPENAI_API_KEY: ${LNZ_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${LNZ_OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${LNZ_OPENAI_BASE_URL:-https://api.openai.com/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${LNZ_DOMAIN}}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      HIDE_DOCS: "true"
      LNZ_API_KEY: ${LNZ_API_KEY:-}
      AI_RATE_LIMIT_PER_MINUTE: ${AI_RATE_LIMIT_PER_MINUTE:-20}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    # Production: 2 workers, no --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=5).read()\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      - api
    # No source volume mounts — uses image's built code
    # Build + start in a single command so the container is self-contained
    command: sh -c "npm run build && npm start"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"    # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    environment:
      LNZ_DOMAIN: ${LNZ_DOMAIN:-localhost}

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
