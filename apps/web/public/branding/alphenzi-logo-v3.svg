<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8450A"/>
      <stop offset="100%" style="stop-color:#FF8C42"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#E8450A;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="28,2 50,14 50,38 28,50 6,38 6,14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="300" height="72" rx="0" fill="#0F1319"/>

  <!-- ═══ INSIGNIA ═══ -->
  <g transform="translate(11, 11)">

    <!-- Outer hexagon border -->
    <polygon points="28,2 50,14 50,38 28,50 6,38 6,14"
      fill="none" stroke="url(#iconGrad)" stroke-width="1.2" opacity="0.5"/>

    <!-- Inner hexagon fill -->
    <polygon points="28,2 50,14 50,38 28,50 6,38 6,14"
      fill="#1A2030" opacity="0.9"/>

    <!-- Subtle inner hex ring -->
    <polygon points="28,10 43,19 43,33 28,42 13,33 13,19"
      fill="none" stroke="#FF7A2A" stroke-width="0.5" opacity="0.2"/>

    <!-- Stylized upward bars — 3 columns, ascending -->
    <rect x="13" y="32" width="6" height="10" rx="1.5" fill="url(#iconGrad)" opacity="0.45"/>
    <rect x="22" y="23" width="6" height="19" rx="1.5" fill="url(#iconGrad)" opacity="0.7"/>
    <rect x="31" y="16" width="6" height="26" rx="1.5" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="40" y="20" width="6" height="22" rx="1.5" fill="url(#iconGrad)"/>

    <!-- Trend line over bars -->
    <polyline points="16,30 25,21 34,14 43,18"
      fill="none" stroke="#FF8C42" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)"/>

    <!-- Arrow tip -->
    <polyline points="39,14 43,18 47,15"
      fill="none" stroke="#FF8C42" stroke-width="1.8"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow)"/>

  </g>

  <!-- ═══ WORDMARK ═══ -->
  <!-- Using tight geometric spacing, clean weight -->
  <text
    x="80" y="44"
    font-family="'Futura', 'Century Gothic', 'Gill Sans', 'Trebuchet MS', sans-serif"
    font-size="26"
    font-weight="300"
    letter-spacing="5"
    fill="#DDE3F0">ALPHENZI</text>

  <!-- Thin accent line below wordmark -->
  <line x1="80" y1="51" x2="272" y2="51"
    stroke="url(#iconGrad)" stroke-width="0.8" opacity="0.4"/>

</svg>
