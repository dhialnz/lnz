# ─────────────────────────────────────────────────────────────────────────────
# LNZ Portfolio Analytics — Docker Compose (Development)
#
# For production:
#   1. Remove `--reload` from api command
#   2. Replace source volume mounts with COPY-based Docker images
#   3. Use strong random passwords (not the defaults below)
#   4. Add HTTPS via a reverse proxy (nginx/caddy/traefik)
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lnz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lnz_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-lnz_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lnz}:${POSTGRES_PASSWORD:-lnz_dev_password}@postgres:5432/${POSTGRES_DB:-lnz_db}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      FILE_ENCRYPTION_KEY: ${FILE_ENCRYPTION_KEY:-dev-file-key-32-bytes-exactly!!}
      MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-mock}
      NEWS_PROVIDER: ${NEWS_PROVIDER:-live}
      MARKET_DATA_BASE_URL: ${MARKET_DATA_BASE_URL:-}
      MARKET_DATA_API_KEY: ${MARKET_DATA_API_KEY:-}
      NEWS_BASE_URL: ${NEWS_BASE_URL:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      AI_PROVIDER: ${LNZ_AI_PROVIDER:-deterministic}
      GEMINI_API_KEY: ${LNZ_GEMINI_API_KEY:-}
      GEMINI_MODEL: ${LNZ_GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_BASE_URL: ${LNZ_GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      OPENAI_API_KEY: ${LNZ_OPENAI_API_KEY:-}
      OPENAI_MODEL: ${LNZ_OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_MODEL_CHAT: ${LNZ_OPENAI_MODEL_CHAT:-}
      OPENAI_MODEL_INSIGHTS: ${LNZ_OPENAI_MODEL_INSIGHTS:-}
      OPENAI_MODEL_DASHBOARD: ${LNZ_OPENAI_MODEL_DASHBOARD:-}
      OPENAI_MODEL_NEWS: ${LNZ_OPENAI_MODEL_NEWS:-}
      OPENAI_BASE_URL: ${LNZ_OPENAI_BASE_URL:-https://api.openai.com/v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - uploads_data:/app/uploads
    # NOTE: --reload is for development only. Remove for production.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "rm -rf /app/.next/* && npm run dev"
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
